services:
  - type: web
    name: suitecraft-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: USE_GROQ
        value: true
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: llama3.1:8b
      - key: STARTUP_CREATE_SCHEMA
        value: false
      - key: FRONTEND_URL
        value: https://your-frontend-domain.example.com
      - key: CORS_ORIGINS
        value: '["https://your-frontend-domain.example.com"]'
      - key: DATABASE_URL
        fromDatabase:
          name: suitecraft-db
          property: connectionString

databases:
  - name: suitecraft-db
    plan: free
    databaseName: suitecraft
    user: suitecraft_user
